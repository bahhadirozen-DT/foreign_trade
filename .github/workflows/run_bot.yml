name: Akilli Dis Ticaret Botunu Calistir

on:
  workflow_dispatch:
    inputs:
      urun_adi:
        description: 'Aranacak Ürün / Sektör Kelimesi (İngilizce önerilir)'
        required: true
        default: 'industrial valves distributor'
      lokasyon:
        description: 'Hedef Şehir ve Ülke'
        required: true
        default: 'Dusseldorf, Germany'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu Tetikle
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          SEARCH_PRODUCT: ${{ github.event.inputs.urun_adi }}
          SEARCH_LOCATION: ${{ github.event.inputs.lokasyon }}
        run: python main.py

