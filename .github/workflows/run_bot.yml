name: Akilli Dis Ticaret Botunu Calistir

on:
  workflow_dispatch:
    inputs:
      urun_adi:
        description: 'Aranacak Ürün / Sektör Kelimesi'
        required: true
        default: 'industrial valves'
      lokasyon:
        description: 'Hedef Şehir ve Ülke (Dünya çapı için global yazın)'
        required: true
        default: 'Milano, Italy'
      proje_no:
        description: 'GitHub CRM Tablo Numarası (Project Number)'
        required: true
        default: '1'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu Tetikle
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          SEARCH_PRODUCT: ${{ github.event.inputs.urun_adi }}
          SEARCH_LOCATION: ${{ github.event.inputs.lokasyon }}
          PROJECT_NUMBER: ${{ github.event.inputs.proje_no }}
          # Renkli emojilerin ve logların Actions üzerinde düzgün görünmesi için:
          PYTHONUNBUFFERED: "1" 
        run: python main.py

      - name: Excel Raporunu Indirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: dis-ticaret-excel-raporu
          path: "**/dis_ticaret_raporu.xlsx"

      # 🌍 YENİ ADIM: Dünya çapındaki interaktif haritayı çıktı olarak ekliyoruz
      - name: Canli B2B Haritasini Indirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: schekur-b2b-global-harita
          path: "**/schekur_global_b2b_map.html"


